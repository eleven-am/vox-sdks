<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vox RTC Express Proxy Demo</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; padding: 24px; background: Canvas; color: CanvasText; }
    main { max-width: 920px; margin: 0 auto; display: grid; gap: 16px; }
    section { border: 1px solid color-mix(in srgb, CanvasText 20%, transparent); border-radius: 8px; padding: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    .status { border: 1px solid color-mix(in srgb, CanvasText 18%, transparent); border-radius: 6px; padding: 10px; min-height: 54px; }
    .status span { display: block; font-size: 12px; color: color-mix(in srgb, CanvasText 68%, transparent); }
    .status strong { display: block; margin-top: 4px; font-size: 15px; }
    label { display: grid; gap: 6px; font-size: 14px; }
    input, textarea, button, select { font: inherit; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid color-mix(in srgb, CanvasText 25%, transparent); border-radius: 6px; background: Canvas; color: CanvasText; }
    textarea { min-height: 96px; resize: vertical; }
    button { min-height: 36px; padding: 8px 12px; border: 1px solid color-mix(in srgb, CanvasText 25%, transparent); border-radius: 6px; background: ButtonFace; color: ButtonText; cursor: pointer; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    pre { min-height: 180px; max-height: 360px; overflow: auto; margin: 0; padding: 12px; border-radius: 6px; background: color-mix(in srgb, CanvasText 8%, Canvas); white-space: pre-wrap; word-break: break-word; font-size: 12px; line-height: 1.45; }
    .timeline { display: grid; gap: 6px; max-height: 240px; overflow: auto; }
    .timeline div { display: grid; grid-template-columns: 86px 1fr; gap: 8px; padding: 6px 8px; border-radius: 6px; background: color-mix(in srgb, CanvasText 7%, Canvas); font-size: 12px; }
    .hint { margin: 8px 0 0; color: color-mix(in srgb, CanvasText 65%, transparent); font-size: 12px; line-height: 1.45; }
  </style>
</head>
<body>
  <main>
    <h1>Vox RTC Express Proxy Demo</h1>

    <section class="grid">
      <label>
        STT model
        <input id="sttModel" value="parakeet-stt-onnx:tdt-0.6b-v3">
      </label>
      <label>
        TTS model
        <input id="ttsModel" value="kokoro-tts-onnx:v1.0">
      </label>
      <label>
        Voice
        <input id="voice" value="af_heart">
      </label>
      <label>
        Turn profile
        <select id="turnProfile">
          <option value="default">default</option>
          <option value="browser_default" selected>browser_default</option>
          <option value="headset">headset</option>
          <option value="speakerphone">speakerphone</option>
          <option value="noisy_room">noisy_room</option>
        </select>
      </label>
    </section>

    <section class="status-grid">
      <div class="status"><span>Peer</span><strong id="peerState">idle</strong></div>
      <div class="status"><span>ICE</span><strong id="iceState">idle</strong></div>
      <div class="status"><span>Data channel</span><strong id="dataChannelState">idle</strong></div>
      <div class="status"><span>Playback</span><strong id="playbackState">idle</strong></div>
      <div class="status"><span>Turn</span><strong id="turnState">idle</strong></div>
      <div class="status"><span>Interruptions</span><strong id="interruptCount">0</strong></div>
      <div class="status"><span>False positives</span><strong id="falsePositiveCount">0</strong></div>
      <div class="status"><span>Session</span><strong id="sessionState">none</strong></div>
    </section>

    <section>
      <div class="actions">
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" disabled>Disconnect</button>
      </div>
      <p class="hint">This page uses the browser only for WebRTC media. The control plane runs through the local Express server with the TypeScript SDK.</p>
      <audio id="assistantAudio" autoplay playsinline controls></audio>
    </section>

    <section>
      <label>
        Assistant text
        <textarea id="assistantText">Hello. This response is being sent through the Express server using the TypeScript SDK. Interrupt me to verify the control path.</textarea>
      </label>
      <div class="actions" style="margin-top: 12px;">
        <button id="sendTextBtn" disabled>Send response</button>
        <button id="cancelBtn" disabled>Cancel response</button>
      </div>
    </section>

    <section>
      <label>
        Client event JSON
        <textarea id="clientEventPayload">{"event":"render.url","payload":{"url":"https://example.com","label":"Example link"}}</textarea>
      </label>
      <div class="actions" style="margin-top: 12px;">
        <button id="sendControlEventBtn" disabled>Send via server control</button>
        <button id="sendDataEventBtn" disabled>Send via data channel</button>
      </div>
      <pre id="dataEventLog"></pre>
    </section>

    <section>
      <div id="timeline" class="timeline"></div>
    </section>

    <section>
      <pre id="log"></pre>
    </section>
  </main>

  <script>
    const sttModelInput = document.querySelector("#sttModel");
    const ttsModelInput = document.querySelector("#ttsModel");
    const voiceInput = document.querySelector("#voice");
    const turnProfileInput = document.querySelector("#turnProfile");
    const connectBtn = document.querySelector("#connectBtn");
    const disconnectBtn = document.querySelector("#disconnectBtn");
    const sendTextBtn = document.querySelector("#sendTextBtn");
    const cancelBtn = document.querySelector("#cancelBtn");
    const sendControlEventBtn = document.querySelector("#sendControlEventBtn");
    const sendDataEventBtn = document.querySelector("#sendDataEventBtn");
    const assistantText = document.querySelector("#assistantText");
    const clientEventPayload = document.querySelector("#clientEventPayload");
    const assistantAudio = document.querySelector("#assistantAudio");
    const dataEventLogEl = document.querySelector("#dataEventLog");
    const logEl = document.querySelector("#log");
    const timelineEl = document.querySelector("#timeline");
    const peerStateEl = document.querySelector("#peerState");
    const iceStateEl = document.querySelector("#iceState");
    const dataChannelStateEl = document.querySelector("#dataChannelState");
    const playbackStateEl = document.querySelector("#playbackState");
    const turnStateEl = document.querySelector("#turnState");
    const interruptCountEl = document.querySelector("#interruptCount");
    const falsePositiveCountEl = document.querySelector("#falsePositiveCount");
    const sessionStateEl = document.querySelector("#sessionState");

    let pc = null;
    let dataChannel = null;
    let voxEventSource = null;
    let controlEventSource = null;
    let mediaToken = null;
    let sessionId = null;
    let clientToken = null;
    let voxHttpBase = null;
    let micStream = null;
    let remoteStream = null;
    let pendingCandidates = [];
    let interruptions = 0;
    let falsePositives = 0;

    function log(type, payload) {
      const line = `[${new Date().toISOString()}] ${type} ${JSON.stringify(payload)}`;
      logEl.textContent += `${line}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function timeline(type, payload = {}) {
      const row = document.createElement("div");
      const at = document.createElement("span");
      at.textContent = new Date().toLocaleTimeString();
      const text = document.createElement("strong");
      const suffix = payload.state
        ? ` ${payload.state}`
        : payload.response_id
          ? ` ${payload.response_id}`
          : "";
      text.textContent = `${type}${suffix}`;
      row.append(at, text);
      timelineEl.prepend(row);
      while (timelineEl.children.length > 80) timelineEl.lastChild.remove();
    }

    function setStatus(el, value) {
      el.textContent = value || "idle";
    }

    function appendDataEvent(direction, payload) {
      const line = `[${new Date().toISOString()}] ${direction} ${JSON.stringify(payload)}`;
      dataEventLogEl.textContent += `${line}\n`;
      dataEventLogEl.scrollTop = dataEventLogEl.scrollHeight;
    }

    function parseClientEventEnvelope() {
      const parsed = JSON.parse(clientEventPayload.value);
      if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
        throw new Error("Client event must be a JSON object");
      }
      if (typeof parsed.event !== "string" || !parsed.event.trim()) {
        throw new Error("Client event requires a non-empty string 'event'");
      }
      return {
        event: parsed.event.trim(),
        payload: Object.prototype.hasOwnProperty.call(parsed, "payload") ? parsed.payload : null
      };
    }

    function candidateType(candidate) {
      if (!candidate) return "end";
      const text = typeof candidate === "string" ? candidate : candidate.candidate || "";
      const match = text.match(/\styp\s([a-z0-9]+)/i);
      return match ? match[1] : "unknown";
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "content-type": "application/json", ...(options.headers || {}) },
        ...options
      });
      if (!response.ok) {
        throw new Error(`${response.status} ${await response.text()}`);
      }
      if (response.status === 204) return null;
      return response.json();
    }

    async function voxPostJson(path, body, token = null) {
      const headers = { "content-type": "application/json" };
      if (token) headers.authorization = `Bearer ${token}`;
      const response = await fetch(`${voxHttpBase}${path}`, {
        method: "POST",
        headers,
        body: JSON.stringify(body)
      });
      if (!response.ok) {
        throw new Error(`${response.status} ${await response.text()}`);
      }
      return response.json();
    }

    async function flushCandidates() {
      if (!mediaToken) return;
      const candidates = pendingCandidates;
      pendingCandidates = [];
      for (const candidate of candidates) {
        await voxPostJson(`/v1/rtc/sessions/${sessionId}/candidates`, { candidate }, mediaToken);
      }
    }

    function bindDataChannel(channel) {
      dataChannel = channel;
      setStatus(dataChannelStateEl, channel.readyState || "connecting");
      log("datachannel.bound", { label: channel.label, readyState: channel.readyState });
      channel.onopen = () => {
        setStatus(dataChannelStateEl, "open");
        sendDataEventBtn.disabled = false;
        log("datachannel.open", { label: channel.label });
        timeline("datachannel.open");
      };
      channel.onclose = () => {
        setStatus(dataChannelStateEl, "closed");
        sendDataEventBtn.disabled = true;
        log("datachannel.close", { label: channel.label });
        timeline("datachannel.close");
        if (dataChannel === channel) dataChannel = null;
      };
      channel.onerror = () => {
        log("datachannel.error", { label: channel.label });
      };
      channel.onmessage = (event) => {
        let payload = event.data;
        if (typeof event.data === "string") {
          try {
            payload = JSON.parse(event.data);
          } catch {
            payload = { raw: event.data };
          }
        }
        appendDataEvent("browser<-backend", payload);
        log("datachannel.message", payload);
      };
    }

    function handleControlEvent(event) {
      timeline(event.type, event.data || {});
      log("control.event", event);
      if (event.type === "client.event") {
        appendDataEvent("backend<-browser", {
          event: event.data?.event,
          payload: Object.prototype.hasOwnProperty.call(event.data || {}, "payload") ? event.data.payload : null
        });
      }
      if (event.type === "session.created") setStatus(turnStateEl, "listening");
      if (event.type === "response.created") setStatus(playbackStateEl, "starting");
      if (event.type === "response.done") setStatus(playbackStateEl, "done");
      if (event.type === "response.cancelled") setStatus(playbackStateEl, "cancelled");
      if (event.type === "response.audio.clear") {
        assistantAudio.pause();
        assistantAudio.srcObject = null;
        setStatus(playbackStateEl, "cleared");
      }
      if (event.type === "interruption.detected") {
        interruptions += 1;
        setStatus(interruptCountEl, String(interruptions));
      }
      if (event.type === "interruption.false_positive") {
        falsePositives += 1;
        setStatus(falsePositiveCountEl, String(falsePositives));
      }
      if (event.type === "turn.state_changed") setStatus(turnStateEl, event.data?.state);
    }

    async function connect() {
      connectBtn.disabled = true;
      const bootstrap = await api("/api/rtc/session", {
        method: "POST",
        body: JSON.stringify({
          sttModel: sttModelInput.value,
          ttsModel: ttsModelInput.value,
          voice: voiceInput.value,
          turnProfile: turnProfileInput.value
        })
      });
      sessionId = bootstrap.sessionId;
      clientToken = bootstrap.clientToken;
      voxHttpBase = bootstrap.voxHttpBase.replace(/\/+$/, "");
      setStatus(sessionStateEl, sessionId);
      log("session", bootstrap);
      timeline("session", { state: sessionId });

      controlEventSource = new EventSource(`/api/rtc/session/${sessionId}/events`);
      controlEventSource.onmessage = (message) => {
        handleControlEvent(JSON.parse(message.data));
      };

      pc = new RTCPeerConnection({ iceServers: bootstrap.iceServers });
      bindDataChannel(pc.createDataChannel("vox-events", { ordered: true }));
      pc.ontrack = (event) => {
        remoteStream = event.streams[0];
        assistantAudio.srcObject = remoteStream;
        assistantAudio.play().catch(() => {});
        log("track", { kind: event.track.kind });
      };
      pc.ondatachannel = (event) => bindDataChannel(event.channel);
      pc.onicecandidate = async (event) => {
        const candidate = event.candidate ? event.candidate.toJSON() : null;
        log("local.ice_candidate", { type: candidateType(candidate), candidate });
        if (!mediaToken) {
          pendingCandidates.push(candidate);
          return;
        }
        await voxPostJson(`/v1/rtc/sessions/${sessionId}/candidates`, { candidate }, mediaToken);
      };
      pc.onconnectionstatechange = () => {
        setStatus(peerStateEl, pc.connectionState);
        log("pc.connectionState", { state: pc.connectionState });
      };
      pc.oniceconnectionstatechange = () => {
        setStatus(iceStateEl, pc.iceConnectionState);
        log("pc.iceConnectionState", { state: pc.iceConnectionState });
      };

      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          channelCount: { ideal: 1 },
          sampleRate: { ideal: 48000 }
        }
      });
      for (const track of micStream.getAudioTracks()) {
        pc.addTrack(track, micStream);
      }

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      const answer = await voxPostJson(
        `/v1/rtc/sessions/${sessionId}/offer`,
        { type: pc.localDescription.type, sdp: pc.localDescription.sdp },
        clientToken
      );
      mediaToken = answer.media_token;
      await pc.setRemoteDescription({ type: answer.type, sdp: answer.sdp });
      await flushCandidates();

      voxEventSource = new EventSource(`${voxHttpBase}${answer.events_url}`);
      voxEventSource.addEventListener("rtc.ice_candidate", async (event) => {
        const payload = JSON.parse(event.data);
        log("sse.ice", payload);
        await pc.addIceCandidate(payload.candidate);
      });
      voxEventSource.addEventListener("rtc.connection_state", (event) => log("sse.connection", JSON.parse(event.data)));
      voxEventSource.addEventListener("rtc.ice_connection_state", (event) => log("sse.ice_connection", JSON.parse(event.data)));

      disconnectBtn.disabled = false;
      sendTextBtn.disabled = false;
      cancelBtn.disabled = false;
      sendControlEventBtn.disabled = false;
    }

    async function disconnect() {
      sendTextBtn.disabled = true;
      cancelBtn.disabled = true;
      sendControlEventBtn.disabled = true;
      sendDataEventBtn.disabled = true;
      disconnectBtn.disabled = true;
      if (voxEventSource) voxEventSource.close();
      if (controlEventSource) controlEventSource.close();
      if (pc) pc.close();
      if (micStream) micStream.getTracks().forEach((track) => track.stop());
      if (sessionId) {
        await api(`/api/rtc/session/${sessionId}`, { method: "DELETE" }).catch(() => {});
      }
      voxEventSource = null;
      controlEventSource = null;
      pc = null;
      micStream = null;
      remoteStream = null;
      mediaToken = null;
      clientToken = null;
      sessionId = null;
      voxHttpBase = null;
      dataChannel = null;
      pendingCandidates = [];
      setStatus(peerStateEl, "idle");
      setStatus(iceStateEl, "idle");
      setStatus(dataChannelStateEl, "idle");
      setStatus(playbackStateEl, "idle");
      setStatus(turnStateEl, "idle");
      setStatus(sessionStateEl, "none");
      connectBtn.disabled = false;
    }

    connectBtn.addEventListener("click", () => connect().catch((error) => {
      log("error", { message: error.message });
      connectBtn.disabled = false;
    }));
    disconnectBtn.addEventListener("click", () => disconnect().catch((error) => log("error", { message: error.message })));
    sendTextBtn.addEventListener("click", () => {
      if (!sessionId) return;
      api(`/api/rtc/session/${sessionId}/respond`, {
        method: "POST",
        body: JSON.stringify({
          text: assistantText.value,
          allowInterruptions: true
        })
      }).catch((error) => log("error", { message: error.message }));
    });
    cancelBtn.addEventListener("click", () => {
      if (!sessionId) return;
      api(`/api/rtc/session/${sessionId}/cancel`, {
        method: "POST",
        body: JSON.stringify({})
      }).catch((error) => log("error", { message: error.message }));
    });
    sendControlEventBtn.addEventListener("click", () => {
      if (!sessionId) return;
      try {
        const envelope = parseClientEventEnvelope();
        api(`/api/rtc/session/${sessionId}/client-event`, {
          method: "POST",
          body: JSON.stringify(envelope)
        }).catch((error) => log("error", { message: error.message }));
      } catch (error) {
        log("client_event.error", { message: error.message });
      }
    });
    sendDataEventBtn.addEventListener("click", () => {
      if (!dataChannel || dataChannel.readyState !== "open") return;
      try {
        const envelope = parseClientEventEnvelope();
        dataChannel.send(JSON.stringify(envelope));
        appendDataEvent("browser->backend", envelope);
      } catch (error) {
        log("client_event.error", { message: error.message });
      }
    });
  </script>
</body>
</html>
