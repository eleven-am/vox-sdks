[project]
name = "vox-rtc-server"
version = "0.1.4"
description = "Server-side Python SDK for Vox-hosted WebRTC sessions."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
authors = [{ name = "eleven-am" }]
dependencies = ["pondsocket-client==0.0.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vox_rtc_server"]
