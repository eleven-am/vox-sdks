name: Verify Elixir SDK

on:
  push:
    branches: [main]
    paths:
      - "elixir/**"
      - ".github/workflows/verify-elixir.yml"
  pull_request:
    paths:
      - "elixir/**"
      - ".github/workflows/verify-elixir.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir/vox_rtc_server
    steps:
      - uses: actions/checkout@v7
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - uses: actions/cache@v5
        with:
          path: |
            elixir/vox_rtc_server/deps
            elixir/vox_rtc_server/_build
          key: elixir-${{ runner.os }}-${{ hashFiles('elixir/vox_rtc_server/mix.lock') }}
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix test
      - run: mix hex.build
